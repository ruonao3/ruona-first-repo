<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noughts and Crosses</title>
    <link
      href="https://fonts.googleapis.com/css?family=Oswald"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">
        <span class="noughts">Noughts</span> &
        <span class="crosses">Crosses</span>
      </h1>
      <h2 id="turn">
        <span id="turnStatus" class="crosses">Player 1's</span> Turn
      </h2>

      <div class="game-container">
        <div class="box" id="0"></div>
        <div class="box" id="1"></div>
        <div class="box" id="2"></div>
        <div class="box" id="3"></div>
        <div class="box" id="4"></div>
        <div class="box" id="5"></div>
        <div class="box" id="6"></div>
        <div class="box" id="7"></div>
        <div class="box" id="8"></div>
      </div>

      <div class="gameModal">
        <div class="closeButton"></div>
        <div class="main">
          <div class="iconHeader">
            <span class="floating-icon">⭕</span>
            <span class="floating-icon">❌</span>
          </div>
          <h1 id="gameStatus">Victory!</h1>
          <h2 id="gameMessage">Player 1 won</h2>
          <button class="gameReset">Play Again</button>
        </div>
      </div>

      <button id="resetBtn">Reset Game</button>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
