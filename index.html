<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noughts and Crosses</title>
    <link
      href="https://fonts.googleapis.com/css?family=Oswald"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="loading-screen" class="screen active">
      <div class="board">
        <div class="note">
          <h1>Tic Tac Toe</h1>
        </div>

        <button id="start-btn" class="start-btn">START GAME</button>
      </div>
    </section>
    <section id="game-screen" class="screen">
      <div class="scoreboard">
        <div class="score-box">Player 1: <span id="score-p1">0</span></div>
        <div class="score-box">Player 2: <span id="score-p2">0</span></div>
      </div>

      <h2 id="turn">
        <span id="turnStatus" class="crosses">Player 1's</span> Turn
      </h2>

      <div class="game-container">
        <div class="box" id="0"></div>
        <div class="box" id="1"></div>
        <div class="box" id="2"></div>
        <div class="box" id="3"></div>
        <div class="box" id="4"></div>
        <div class="box" id="5"></div>
        <div class="box" id="6"></div>
        <div class="box" id="7"></div>
        <div class="box" id="8"></div>
      </div>

      <div id="gameModal" class="gameModal">
        <span class="closeButton" id="closeModal">&times;</span>
        <h2 id="gameStatus">Winner!</h2>
        <p id="gameMessage">Player 1 takes the game.</p>
        <button class="gameReset" id="modalResetBtn">Play Again</button>
      </div>

      <button id="resetBtn">Reset Game</button>
    </section>

    <script src="./main.js"></script>
  </body>
</html>
